<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4CAF50">
    <meta name="description" content="QR Code Scanner for Food Event Check-in">
    <title>Event Check-in Scanner</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">

    <!-- QR Scanner Library -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <h1>Event Check-in</h1>
            <button id="statsBtn" class="icon-btn" aria-label="View Statistics">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="20" x2="18" y2="10"></line>
                    <line x1="12" y1="20" x2="12" y2="4"></line>
                    <line x1="6" y1="20" x2="6" y2="14"></line>
                </svg>
            </button>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Scanner Section -->
            <section id="scannerSection" class="scanner-section">
                <div id="reader" class="qr-reader"></div>
                <p class="scanner-hint">Point camera at QR code to scan</p>
            </section>

            <!-- Manual Entry Section -->
            <section class="manual-entry">
                <button id="toggleManual" class="toggle-btn">
                    Enter Token Manually
                </button>
                <div id="manualInput" class="manual-input-container hidden">
                    <input
                        type="text"
                        id="tokenInput"
                        placeholder="Enter token (e.g., EVT-ABC123-4567)"
                        autocomplete="off"
                        autocapitalize="characters"
                    >
                    <button id="submitToken" class="submit-btn">Check In</button>
                </div>
            </section>

            <!-- Result Display -->
            <section id="resultSection" class="result-section hidden">
                <div id="resultCard" class="result-card">
                    <div id="resultIcon" class="result-icon"></div>
                    <h2 id="resultTitle" class="result-title"></h2>
                    <div id="resultDetails" class="result-details"></div>
                    <button id="scanAgain" class="scan-again-btn">Scan Next</button>
                </div>
            </section>
        </main>

        <!-- Stats Modal -->
        <div id="statsModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Event Statistics</h2>
                    <button id="closeStats" class="close-btn">&times;</button>
                </div>
                <div id="statsContent" class="stats-content">
                    <div class="loading">Loading...</div>
                </div>
            </div>
        </div>

        <!-- Configuration Modal -->
        <div id="configModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Configuration</h2>
                    <button id="closeConfig" class="close-btn">&times;</button>
                </div>
                <div class="config-content">
                    <label for="apiUrl">Google Apps Script Web App URL:</label>
                    <input
                        type="url"
                        id="apiUrl"
                        placeholder="https://script.google.com/macros/s/..."
                    >
                    <button id="saveConfig" class="submit-btn">Save</button>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="app-footer">
            <button id="configBtn" class="config-link">Configure API</button>
        </footer>
    </div>
